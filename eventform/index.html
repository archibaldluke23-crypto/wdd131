<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Ticket Form</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <div id="wrapper">
        <h1>Event Ticket</h1>
        <form id="form">
            <div class="feild">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>
            <div class="feild">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>
            <div class="feild full">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="feild">
                <label for="type">Type</label>
                <select id="type" name="type" aria-controls="notesContainer" required>
                    <option value="">Choose one</option>
                    <option value="student">Student</option>
                    <option value="guest">Guest</option>
                </select>
            </div>
            <div class="feild">
                <label for="date">Event Date</label>
                <input type="date" id="date" name="date" required>
            </div>
            <div class="hidden feild full" id="studentI">
                <label for="studentI">Student I#</label>
                <input type="text" id="studentIInput" name="studentI">
            </div>
            <div class="hidden feild full" id="accessCode">
                <label for="accessCode">Access Code</label>
                <input type="text" id="accessCodeInput" name="accessCode">
            </div>
            <button class="full" type="submit">Create Ticket</button>
        </form>
        <section id="output" aria-live="polite"></section>
    </div>
</body>
</html>
