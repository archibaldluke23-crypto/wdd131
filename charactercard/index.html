<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card Creater">
    <meta property="og:description" content="Create a character card with a name, class, level, and health">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card Creater">
    <meta name="twitter:description" content="Create a character card with a name, class, level, and health">
    <meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

    <!-- One favicon (ICO works everywhere) -->
   <link rel="icon" type="image/png" href="favicon.png">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="favicon.png">

    <title>Character Card Creater</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="card">
        <img class="image" src="images/gatter-character.webp" alt="Alligator warrior character">
        <h1 class="name" aria-label="Name">Snortleblat</h1>
        <section class="stats" aria-label="Stats">
            <p>Class: Swamp Beast Diplomat</p>
            <p id="levelDisplay">Level: 1</p>
            <p id="healthDisplay">Health: 100</p>
        </section>
        <section class="buttons">
            <button id="attacked">Attacked</button>
            <button id="levelUp">Level Up</button>
        </section>
    </div>
</body>
</html>
