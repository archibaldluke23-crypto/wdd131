<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="Recipe book list to find new meals to make">
    <meta property="og:url" content="Your URL">
    <meta property="og:image" content="social-preview-image.png">

    <!-- X Card -->
    <meta name="twitter:card" content="Social Preview Image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="Recipe book list to find new meals to make">
    <meta name="twitter:image" content="social-preview-image.png">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
    <title>Recipe Book</title>
</head>
<body>

<header>
    <div id="title">
        <img src="images/recipe-book.png" alt="recipe book icon">
        <h1>RECIPEBOOK</h1>
    </div>
    <div id="search">
        <input type="text" placeholder="Find a recipe" aria-label="Find a recipe search">
        <hr id="search-hr">
        <button type="submit"><img src="images/search.svg" alt="search icon"></button>
    </div>
    <hr id="divider">
</header>
<main>
    <img src="images/apple-crisp.jpg" alt="apple crisp image">
    <h3 id="food-type">dessert</h3>
    <h2>APPLE CRISP</h2>
    <span
    class="rating"
    role="img"
    aria-label="Rating: 4 out of 5 stars"
    >
        <span aria-hidden="true" class="icon-star">⭐</span>
        <span aria-hidden="true" class="icon-star">⭐</span>
        <span aria-hidden="true" class="icon-star">⭐</span>
        <span aria-hidden="true" class="icon-star">⭐</span>
        <span aria-hidden="true" class="icon-star-empty">☆</span>
    </span>
    <p id="description" class="hide">
        This apple crisp recipe is simple yet delicious fall dessert that's great served warm with vanilla ice cream.
    </p>
</main>
<footer>      
    <div class="social">
    <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
    <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
    <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
    <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
    </div>                  
    <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                   
</footer>             
</body>
</html>
